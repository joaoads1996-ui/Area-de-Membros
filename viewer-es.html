  title:'Proyectos Galpones Metálicos',
  sub:'Del galpón rural al industrial — estructura, materiales, montaje y el trabajo de mayor ticket de la herrería.',
  toc:[{id:'s1',label:'Tipos de Galpón'},{id:'s2',label:'Estructura'},{id:'s3',label:'Materiales'},{id:'s4',label:'Montaje'},{id:'s5',label:'Cubierta'},{id:'s6',label:'Ticket y Negocio'}],
  html:`
  <div class="intro-box">Un galpón metálico es el <strong>trabajo de mayor ticket que puede hacer un herrero</strong>. Un proyecto de 15×30m puede facturar más en una semana que meses de trabajos pequeños. Con este material aprende la estructura, los materiales y el proceso de montaje.</div>
  <div class="section" id="s1"><div class="sec-label"><div class="icon">🏭</div><h2>Tipos de Galpón Metálico</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">🏠</span><div><strong>Galpón de dos aguas simple</strong> — el más común en zonas rurales y urbanas. 2 faldones simétricos.<div class="detail">Inclinación mínima para chapa ondulada: 8%. Para chapa trapezoidal: 5%.</div></div></li>
    <li><span class="li-icon">🏗️</span><div><strong>Galpón monopendiente (shed)</strong> — un solo faldón inclinado. Más simple, ideal para adosarse a una pared existente.</div></li>
    <li><span class="li-icon">🏭</span><div><strong>Nave industrial con lanternim</strong> — galpón con abertura cenital para ventilación e iluminación natural.</div></li>
    <li><span class="li-icon">🌾</span><div><strong>Galpón agropecuario</strong> — estructura simple y económica para granjas, depósito de maquinaria y cría de animales.</div></li>
  </ul></div>
  <div class="section" id="s2"><div class="sec-label"><div class="icon">📐</div><h2>Estructura Tipo — Galpón 10×20m</h2></div>
  <div class="spec-grid">
    <div class="spec-card"><div class="lbl">Span (vano)</div><div class="val">10,00m</div></div>
    <div class="spec-card"><div class="lbl">Largo</div><div class="val">20,00m</div></div>
    <div class="spec-card"><div class="lbl">Altura de pared</div><div class="val">3,00m – 4,00m</div></div>
    <div class="spec-card"><div class="lbl">Módulo entre cerchas</div><div class="val">4,00m – 5,00m</div></div>
    <div class="spec-card"><div class="lbl">Columnas</div><div class="val">Tubo Ø4" / 100×100mm</div></div>
    <div class="spec-card"><div class="lbl">Correas</div><div class="val">Perfil Z o C 100mm</div></div>
  </div></div>
  <div class="section" id="s3"><div class="sec-label"><div class="icon">📦</div><h2>Materiales para Galpón 10×20m</h2></div>
  <table class="data-table"><thead><tr><th>Componente</th><th>Material</th><th>Cantidad aprox.</th></tr></thead><tbody>
    <tr><td><strong>Columnas</strong></td><td>Tubo cuadrado 100×100mm cal.10</td><td>10 unidades × 4m</td></tr>
    <tr><td><strong>Vigas armadas (cerchas)</strong></td><td>Ángulo 50×5mm (celosía)</td><td>5 cerchas</td></tr>
    <tr><td><strong>Correas de techo</strong></td><td>Perfil C o Z 100mm</td><td>140m lineales</td></tr>
    <tr><td><strong>Chapa de techo</strong></td><td>Trapezoidal 0,43mm galvanizada</td><td>220m² + 10% solape</td></tr>
    <tr><td><strong>Pernos de anclaje</strong></td><td>M16 o M20</td><td>10 conjuntos</td></tr>
    <tr><td><strong>Canalones</strong></td><td>PVC o chapa galvanizada Ø4"</td><td>40m lineales</td></tr>
  </tbody></table></div>
  <div class="section" id="s4"><div class="sec-label"><div class="icon">⚡</div><h2>Montaje del Galpón</h2></div>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-body"><h4>Cimentación y anclajes</h4><p>Los pilares se anclan en platinas de base empotradas en el hormigón. Nivele y aplome antes de que el hormigón endurezca. Espere curado mínimo de 7 días.</p><div class="tip">El aplomo y la nivelación de los anclajes determinan todo el galpón. Invierta tiempo aquí.</div></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-body"><h4>Izaje de columnas</h4><p>Monte las columnas con camión grúa. Fije provisionalmente con puntales antes de soldar definitivamente.</p></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-body"><h4>Instalación de cerchas y correas</h4><p>Monte las cerchas en el suelo y luego ícelas completas. Instale las correas perpendiculares a las cerchas. Coloque contraventeos en X entre cerchas para rigidizar ante viento lateral.</p></div></div>
    <div class="step"><div class="step-num">4</div><div class="step-body"><h4>Colocación de la chapa</h4><p>Empiece desde los extremos hacia el centro. Solape mínimo de 1 onda lateral y 20cm longitudinal. Fije con tornillos autoperforantes con goma cada 2ª onda.</p></div></div>
  </div></div>
  <div class="section" id="s5"><div class="sec-label"><div class="icon">🏠</div><h2>Cubierta</h2></div>
  <table class="data-table"><thead><tr><th>Tipo de chapa</th><th>Vida útil</th><th>Costo</th></tr></thead><tbody>
    <tr><td><strong>Ondulada galvanizada</strong></td><td>10–15 años</td><td>Bajo</td></tr>
    <tr><td><strong>Trapezoidal galvanizada</strong></td><td>15–25 años</td><td>Medio</td></tr>
    <tr><td><strong>Trapezoidal prepintada</strong></td><td>20–30 años</td><td>Medio-alto</td></tr>
    <tr><td><strong>Panel sandwich</strong></td><td>25+ años</td><td>Alto</td></tr>
  </tbody></table></div>
  <div class="section" id="s6"><div class="sec-label"><div class="icon">💰</div><h2>Ticket y Negocio</h2></div>
  <div class="highlight"><div class="hl-title">El Trabajo que Cambia la Vida del Herrero</div>
  <ul><li>Galpón rural simple (estructura + chapa): $80–120 USD/m²</li><li>Galpón industrial (estructura + chapa + cerramiento): $150–250 USD/m²</li><li>Un galpón 10×20m factura entre $16.000 y $50.000 USD</li><li>Un cliente satisfecho indica otros 3 en promedio</li></ul></div></div>`
}

,solda_p1:{
  img:'mestre-solda.png',
  badge:'CAPACITACIÓN TÉCNICA',
  title:'Maestro de la Soldadura Profesional',
  sub:'Guía técnica completa de soldadura — MIG, TIG, electrodo revestido, parámetros, defectos y técnica profesional.',
  toc:[{id:'s1',label:'Comparativo de Procesos'},{id:'s2',label:'Soldadura MIG/MAG'},{id:'s3',label:'Electrodo Revestido'},{id:'s4',label:'Soldadura TIG'},{id:'s5',label:'Defectos y Soluciones'},{id:'s6',label:'Seguridad'}],
  html:`
  <div class="intro-box">Dominar la soldadura es lo que separa al herrero amateur del profesional. <strong>La calidad de la soldadura define el precio que puede cobrar</strong>. Una soldadura limpia, sin poros, con cordones uniformes — eso es lo que el cliente percibe como calidad.</div>
  <div class="section" id="s1"><div class="sec-label"><div class="icon">🔥</div><h2>Comparativo de Procesos</h2></div>
  <table class="data-table"><thead><tr><th>Proceso</th><th>Ventaja</th><th>Limitación</th><th>Uso ideal</th></tr></thead><tbody>
    <tr><td><strong>MIG/MAG</strong></td><td>Rápido, continuo, semi-automático</td><td>Sensible al viento</td><td>Estructuras, remolques, muebles</td></tr>
    <tr><td><strong>Electrodo revestido</strong></td><td>Portátil, sin gas, robusto</td><td>Más lento, más escoria</td><td>Campo, reparaciones, estructuras pesadas</td></tr>
    <tr><td><strong>TIG</strong></td><td>Máxima precisión y acabado</td><td>Lento, requiere más habilidad</td><td>Inox, aluminio, trabajos de alta calidad</td></tr>
  </tbody></table></div>
  <div class="section" id="s2"><div class="sec-label"><div class="icon">⚡</div><h2>Soldadura MIG/MAG — Parámetros Completos</h2></div>
  <table class="data-table"><thead><tr><th>Material / Espesor</th><th>Corriente (A)</th><th>Tensión (V)</th><th>Gas</th><th>Hilo</th></tr></thead><tbody>
    <tr><td>Chapa 1,2mm (cal.18)</td><td>70–85A</td><td>16–17V</td><td>CO₂ o Ar+CO₂</td><td>0,8mm</td></tr>
    <tr><td>Tubo 40×40 cal.16</td><td>90–110A</td><td>17–18V</td><td>CO₂ o Ar+CO₂</td><td>0,8mm</td></tr>
    <tr><td>Tubo 50×50 cal.14</td><td>110–130A</td><td>18–19V</td><td>CO₂ o Ar+CO₂</td><td>0,8mm</td></tr>
    <tr><td>Chapa 3mm</td><td>130–155A</td><td>19–20V</td><td>CO₂ o Ar+CO₂</td><td>0,9mm</td></tr>
    <tr><td>Chapa 6mm</td><td>200–240A</td><td>21–23V</td><td>CO₂ o Ar+CO₂</td><td>1,0–1,2mm</td></tr>
    <tr><td>Acero inoxidable 1,5mm</td><td>80–100A</td><td>17–18V</td><td>Ar+2%CO₂</td><td>308L 0,8mm</td></tr>
  </tbody></table>
  <div class="highlight"><div class="hl-title">Técnica del Cordón MIG</div><ul>
    <li><strong>Ángulo de inclinación:</strong> 10°–15° en el sentido de avance para mayor penetración</li>
    <li><strong>CTWD:</strong> 10–15mm para hilo 0,8mm</li>
    <li><strong>Velocidad:</strong> mantenga el sonido constante (como chisporroteo de tocino)</li>
    <li><strong>Gas:</strong> CO₂ puro = más penetración y económico. Ar+CO₂ = menos salpicaduras</li>
  </ul></div></div>
  <div class="section" id="s3"><div class="sec-label"><div class="icon">🔌</div><h2>Electrodo Revestido — Guía Completa</h2></div>
  <table class="data-table"><thead><tr><th>Electrodo</th><th>Corriente</th><th>Posición</th><th>Aplicación</th></tr></thead><tbody>
    <tr><td><strong>6013 Ø2,5mm</strong></td><td>60–80A CC+ o CA</td><td>Todas</td><td>Chapas finas, todo uso</td></tr>
    <tr><td><strong>6013 Ø3,25mm</strong></td><td>90–130A CC+ o CA</td><td>Todas</td><td>Estructuras medianas, uso general</td></tr>
    <tr><td><strong>7018 Ø3,25mm</strong></td><td>100–145A CC+</td><td>Todas</td><td>Alta resistencia, estructuras de carga</td></tr>
    <tr><td><strong>7018 Ø4mm</strong></td><td>150–190A CC+</td><td>Plana y horizontal</td><td>Vigas, galpones, estructuras críticas</td></tr>
  </tbody></table>
  <div class="warning"><strong>Electrodo 7018 — cuidado con la humedad:</strong> absorbe humedad del ambiente generando poros e hidrógeno en la soldadura. Guarde en estufa a 120°C o en lata hermética.</div></div>
  <div class="section" id="s4"><div class="sec-label"><div class="icon">🎯</div><h2>Soldadura TIG — Fundamentos</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">⚡</span><div><strong>DCEN (corriente continua negativa)</strong> — para acero al carbono e inoxidable. Mayor concentración de calor en la pieza.<div class="detail">Electrodo: EWTh-2 (toriado) o EWCe-2 (ceriado). Afilar en punta cónica.</div></div></li>
    <li><span class="li-icon">⚡</span><div><strong>CA (corriente alterna)</strong> — para aluminio y magnesio. La alternancia limpia la capa de óxido del aluminio.<div class="detail">Electrodo: EWP (tungsteno puro, verde). La punta se bola durante el soldeo — es normal.</div></div></li>
    <li><span class="li-icon">🎨</span><div><strong>Gas de protección:</strong> Argônio puro (99,99%) para todos los procesos TIG. Caudal: 6–12 L/min.</div></li>
  </ul></div>
  <div class="section" id="s5"><div class="sec-label"><div class="icon">🔍</div><h2>Defectos de Soldadura y Soluciones</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">❌</span><div><strong>Porosidad</strong> — burbujas de gas atrapadas en el metal.<br><strong>Causas:</strong> gas contaminado, superficie sucia, electrodo húmedo.<br><strong>Solución:</strong> limpiar la superficie, verificar el gas, secar los electrodos.</div></li>
    <li><span class="li-icon">❌</span><div><strong>Fisuras (grietas)</strong> — las más peligrosas. En caliente o en frío.<br><strong>Causas:</strong> alta velocidad de enfriamiento, hidrógeno difusible.<br><strong>Solución:</strong> precalentar el acero, usar 7018 seco.</div></li>
    <li><span class="li-icon">❌</span><div><strong>Falta de fusión</strong> — metal de aportación no se une al metal base.<br><strong>Causas:</strong> corriente insuficiente, velocidad excesiva.<br><strong>Solución:</strong> aumentar corriente, reducir velocidad.</div></li>
    <li><span class="li-icon">❌</span><div><strong>Socavación (mordedura)</strong> — ranura en el metal base junto al cordón.<br><strong>Causas:</strong> corriente excesiva, ángulo incorrecto.<br><strong>Solución:</strong> reducir corriente, dirigir el arco al cordón.</div></li>
  </ul></div>
  <div class="section" id="s6"><div class="sec-label"><div class="icon">🦺</div><h2>Seguridad en Soldadura</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">🥽</span><div><strong>Protección ocular:</strong> máscara con filtro DIN 11 (MIG/MAG) o DIN 10 (electrodo). La radiación UV causa conjuntivitis en minutos.</div></li>
    <li><span class="li-icon">💨</span><div><strong>Ventilación:</strong> los humos contienen óxidos de manganeso. Use ventilación forzada o máscara P100.</div></li>
    <li><span class="li-icon">🧤</span><div><strong>EPIs obligatorios:</strong> guantes de cuero, delantal de cuero, botines con punta de acero, manga larga de algodón.</div></li>
    <li><span class="li-icon">🔥</span><div><strong>Prevención de incendios:</strong> retire materiales combustibles en 10m. Tenga extintor próximo.</div></li>
  </ul></div>`
}

,solda_p2:{
  img:'mestre-solda.png',
  badge:'CAPACITACIÓN TÉCNICA',
  title:'Maestro de la Soldadura — Técnicas Avanzadas',
  sub:'Preparación de juntas, secuencias de depósito, control de distorsión, soldadura en tubería y control de calidad.',
  toc:[{id:'s1',label:'Preparación de Juntas'},{id:'s2',label:'Secuencias de Soldadura'},{id:'s3',label:'Control de Distorsión'},{id:'s4',label:'Soldadura en Tubería'},{id:'s5',label:'Control de Calidad'}],
  html:`
  <div class="intro-box">Esta es la guía complementaria — enfocada en técnica avanzada, preparación de juntas y control de calidad. <strong>La diferencia entre un soldador bueno y uno excelente está en dominar estas técnicas</strong>.</div>
  <div class="section" id="s1"><div class="sec-label"><div class="icon">✂️</div><h2>Preparación de Juntas</h2></div>
  <table class="data-table"><thead><tr><th>Tipo de junta</th><th>Chanfro</th><th>Apertura de raíz</th><th>Cuándo usar</th></tr></thead><tbody>
    <tr><td><strong>Tope filete (I)</strong></td><td>Sin chanfro</td><td>0–2mm</td><td>Chapas hasta 3mm</td></tr>
    <tr><td><strong>Tope en V simple</strong></td><td>60°–70° total</td><td>2–3mm</td><td>Chapas 3–12mm</td></tr>
    <tr><td><strong>Tope en V doble (X)</strong></td><td>60° cada lado</td><td>2–3mm</td><td>Chapas 12mm+ — reduce distorsión</td></tr>
    <tr><td><strong>Ángulo en T</strong></td><td>45° en piezas gruesas</td><td>0–1mm</td><td>El más común en herrería</td></tr>
  </tbody></table>
  <div class="tip-box"><strong>Regla de oro:</strong> limpie toda la zona con esmeril hasta metal brillante. Óxido, pintura y humedad son las principales causas de defectos.</div></div>
  <div class="section" id="s2"><div class="sec-label"><div class="icon">🔄</div><h2>Secuencias de Soldadura</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">🔄</span><div><strong>Secuencia de retroceso (backstep)</strong> — suelde segmentos cortos (15–25cm) en dirección opuesta al avance general. La distorsión se distribuye y cancela.<div class="detail">Ejemplo en chapa de 1m: empiece en el centro, primer cordón hacia la derecha (25cm), segundo antes del primero, etc.</div></div></li>
    <li><span class="li-icon">⚖️</span><div><strong>Secuencia simétrica</strong> — suelde siempre en pares de cordones en lados opuestos para balancear las contracciones.</div></li>
    <li><span class="li-icon">🌡️</span><div><strong>Temperatura entre pasadas</strong> — deje enfriar a menos de 250°C entre pases.</div></li>
  </ul></div>
  <div class="section" id="s3"><div class="sec-label"><div class="icon">📏</div><h2>Control de Distorsión</h2></div>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-body"><h4>Precurvado (pre-bending)</h4><p>Pre-doble en sentido opuesto a la distorsión esperada. Cuando suelde y la pieza curve de vuelta, quedará en posición correcta.</p></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-body"><h4>Puntos de fijación (tack welds)</h4><p>Fije la pieza con puntos cada 10–15cm antes de soldar el cordón completo. Los puntos deben tener al menos 10mm de longitud.</p></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-body"><h4>Restricción mecánica</h4><p>Use mesas de soldar, prensas, sargentos y cuñas para mantener piezas en posición — el método más eficaz.</p></div></div>
    <div class="step"><div class="step-num">4</div><div class="step-body"><h4>Corrección post-soldadura</h4><p>Si la pieza distorsionó, caliente la zona cóncava hasta el rojo oscuro (600–700°C) y deje enfriar lentamente.</p></div></div>
  </div></div>
  <div class="section" id="s4"><div class="sec-label"><div class="icon">🔧</div><h2>Soldadura en Tubería</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">🎯</span><div><strong>Pase de raíz</strong> — el más crítico. Debe tener fusión completa y penetración total. Use electrodo 6010 (CC+) o 6013 con arco corto.<div class="detail">El pase de raíz puede tener refuerzo visible de 1–3mm en el interior del tubo.</div></div></li>
    <li><span class="li-icon">🔼</span><div><strong>Pases de relleno y acabado</strong> — limpie la escoria completamente entre cada pase.</div></li>
    <li><span class="li-icon">🔄</span><div><strong>Posición 5G (tubo horizontal fijo)</strong> — la más desafiante. Divida el tubo en 2 mitades y complete cada mitad de abajo hacia arriba.</div></li>
  </ul></div>
  <div class="section" id="s5"><div class="sec-label"><div class="icon">🔍</div><h2>Control de Calidad</h2></div>
  <table class="data-table"><thead><tr><th>Ensayo</th><th>Cómo hacer</th><th>Lo que detecta</th></tr></thead><tbody>
    <tr><td><strong>Visual (END-V)</strong></td><td>Inspección con lupa 5×–10×</td><td>Grietas superficiales, porosidad, socavación</td></tr>
    <tr><td><strong>Líquidos penetrantes</strong></td><td>Penetrante → limpiar → revelar</td><td>Grietas y poros abiertos en superficie</td></tr>
    <tr><td><strong>Prueba de impacto</strong></td><td>Golpear la soldadura con martillo</td><td>Delamientos y falta de fusión</td></tr>
    <tr><td><strong>Prueba de doblez</strong></td><td>Doblar cupón a 180° con prensa</td><td>Ductilidad y fusión — no fisura si es buena</td></tr>
  </tbody></table></div>`
}

,aco_p1:{
  img:'tipos-aco.webp',
  badge:'CAPACITACIÓN TÉCNICA',
  title:'Tipos de Acero & Aplicaciones',
  sub:'Guía completa de aceros y perfiles metálicos — características, propiedades mecánicas y cómo elegir el material correcto.',
  toc:[{id:'s1',label:'Clasificación del Acero'},{id:'s2',label:'Aceros Más Usados'},{id:'s3',label:'Acero Inoxidable'},{id:'s4',label:'Perfiles y Aplicaciones'},{id:'s5',label:'Cómo Elegir'},{id:'s6',label:'Protección Anticorrosiva'}],
  html:`
  <div class="intro-box">Elegir el acero correcto para cada proyecto es lo que diferencia al herrero profesional del amateur. <strong>El material correcto reduce costos, aumenta la durabilidad y mejora la calidad del trabajo final</strong>.</div>
  <div class="section" id="s1"><div class="sec-label"><div class="icon">🔬</div><h2>Clasificación del Acero</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">⚙️</span><div><strong>Acero al Carbono Bajo (SAE 1010–1020)</strong> — el más usado en herrería. Fácil de soldar, doblar, cortar y mecanizar.<div class="detail">Resistencia: 340–480 MPa. Aplicaciones: tubos, chapas, perfiles, portones, remolques, muebles.</div></div></li>
    <li><span class="li-icon">⚙️</span><div><strong>Acero al Carbono Medio (SAE 1040–1050)</strong> — más resistente y duro. Requiere precalentamiento para soldar.<div class="detail">Aplicaciones: ejes, engranajes, pernos, piezas con desgaste.</div></div></li>
    <li><span class="li-icon">✨</span><div><strong>Acero Inoxidable Austenítico (304, 316)</strong> — resistente a la corrosión. 316 con molibdeno para ambientes marinos.<div class="detail">No se magnetiza. Para alimentos y ambientes agresivos.</div></div></li>
    <li><span class="li-icon">🛡️</span><div><strong>Acero Galvanizado</strong> — acero al carbono con recubrimiento de zinc. Vida útil: 15–30 años en ambiente urbano.<div class="detail">Para soldar: limpie el zinc en la zona de soldadura — los humos de zinc son tóxicos.</div></div></li>
  </ul></div>
  <div class="section" id="s2"><div class="sec-label"><div class="icon">🏗️</div><h2>Aceros de Construcción Más Usados</h2></div>
  <table class="data-table"><thead><tr><th>Norma</th><th>Resistencia</th><th>Aplicación típica</th></tr></thead><tbody>
    <tr><td><strong>A36 (USA)</strong></td><td>250 MPa mínimo</td><td>Perfiles estructurales, chapas, tubo</td></tr>
    <tr><td><strong>A572 Gr.50</strong></td><td>345 MPa mínimo</td><td>Vigas, columnas, estructuras de mayor carga</td></tr>
    <tr><td><strong>SAE 1045</strong></td><td>570–700 MPa</td><td>Ejes, pernos, piñones, piezas de desgaste</td></tr>
  </tbody></table></div>
  <div class="section" id="s3"><div class="sec-label"><div class="icon">✨</div><h2>Acero Inoxidable — Cómo Trabajarlo</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">✂️</span><div><strong>Corte:</strong> use disco específico para inoxidable. No use el mismo disco del acero al carbono — contamina el inox.<div class="detail">Alternativa: plasma, agua o láser para cortes precisos sin calentamiento.</div></div></li>
    <li><span class="li-icon">⚡</span><div><strong>Soldadura TIG en inoxidable 304:</strong> corriente DCEN, electrodo EWTh-2, gas Argônio puro, metal de aportación ER308L.<div class="detail">Control del calor es crítico — el inox se distorsiona fácilmente. Suelde en secuencias cortas.</div></div></li>
    <li><span class="li-icon">⚠️</span><div><strong>Contaminación del inox:</strong> nunca apoye inoxidable sobre acero al carbono sin protección. Las partículas generan corrosión.</div></li>
  </ul></div>
  <div class="section" id="s4"><div class="sec-label"><div class="icon">📐</div><h2>Perfiles Metálicos y Sus Aplicaciones</h2></div>
  <table class="data-table"><thead><tr><th>Perfil</th><th>Sección</th><th>Aplicaciones</th></tr></thead><tbody>
    <tr><td><strong>Tubo cuadrado (metalon)</strong></td><td>20×20 a 100×100mm</td><td>Muebles, portones, remolques, estructuras</td></tr>
    <tr><td><strong>Tubo rectangular</strong></td><td>20×10 a 100×50mm</td><td>Chassis, travesaños, estructuras planas</td></tr>
    <tr><td><strong>Tubo redondo</strong></td><td>Ø½" a Ø4"</td><td>Arcos, barras, ejes, decoración</td></tr>
    <tr><td><strong>Viga I / H</strong></td><td>W100 a W500</td><td>Vigas de galpones, entrepisos, puentes</td></tr>
    <tr><td><strong>Canal U (perfil C)</strong></td><td>50 a 200mm</td><td>Chassis de remolques, correas de techo</td></tr>
    <tr><td><strong>Ángulo (L)</strong></td><td>25×3 a 100×10mm</td><td>Marcos, celosías, refuerzos</td></tr>
    <tr><td><strong>Chapa antideslizante</strong></td><td>3mm a 6mm</td><td>Pisos de remolques, escaleras, rampas</td></tr>
  </tbody></table></div>
  <div class="section" id="s5"><div class="sec-label"><div class="icon">🎯</div><h2>Cómo Elegir el Acero Correcto</h2></div>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-body"><h4>Defina la carga</h4><p>¿Estático o dinámico? Las cargas dinámicas (impacto, vibración, fatiga) requieren aceros de mayor resistencia.</p></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-body"><h4>Defina el ambiente</h4><p>Interior seco → acero + pintura básica. Exterior → galvanizado. Agua salada → inoxidable 316. Alimentos → inoxidable 304 obligatorio.</p></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-body"><h4>Compare el costo-beneficio</h4><p>El material más caro no siempre es el mejor. Un remolque en A36 bien pintado dura 15–20 años.</p></div></div>
  </div></div>
  <div class="section" id="s6"><div class="sec-label"><div class="icon">🛡️</div><h2>Protección Anticorrosiva</h2></div>
  <table class="data-table"><thead><tr><th>Sistema</th><th>Vida útil</th><th>Indicado para</th></tr></thead><tbody>
    <tr><td><strong>Primer + Esmalte</strong></td><td>3–5 años</td><td>Uso general, interior y exterior simple</td></tr>
    <tr><td><strong>Epoxi + Poliuretano</strong></td><td>7–12 años</td><td>Exterior agresivo, equipos industriales</td></tr>
    <tr><td><strong>Galvanizado en caliente</strong></td><td>15–30 años</td><td>Estructuras exteriores de alta durabilidad</td></tr>
    <tr><td><strong>Pintura electrostática</strong></td><td>10–15 años</td><td>Muebles, portones, equipos de alta calidad</td></tr>
  </tbody></table></div>`
}

,prec_p1:{
  img:'capa-guia-precificacao-01.jpg',
  badge:'HERRAMIENTAS DE NEGOCIO',
  title:'Guía Completo de Precificación para Herreros',
  sub:'Aprenda a calcular el precio correcto de cada trabajo — nunca más trabaje por debajo del costo real.',
  toc:[{id:'s1',label:'Por qué los Herreros Cobran Mal'},{id:'s2',label:'Cálculo del Costo Real'},{id:'s3',label:'Valor Hora'},{id:'s4',label:'Fórmula del Precio Final'},{id:'s5',label:'Tabla de Precios'},{id:'s6',label:'Cómo Presentar el Presupuesto'}],
  html:`
  <div class="intro-box">La mayoría de los herreros son excelentes técnicos pero pésimos empresarios. <strong>Quien no sabe calcular el costo real, regala su tiempo y su energía</strong>. Esta guía lo lleva a calcular con precisión el precio correcto — y a cobrar sin miedo.</div>
  <div class="section" id="s1"><div class="sec-label"><div class="icon">🤔</div><h2>Por qué los Herreros Cobran Mal</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">❌</span><div><strong>No calculan el tiempo de trabajo</strong> — cotizan por instinto. Si el portón tomó 12 horas, ese tiempo tiene un costo real que rara vez entra en el cálculo.</div></li>
    <li><span class="li-icon">❌</span><div><strong>Olvidan los gastos operativos</strong> — electricidad, gas CO₂, consumibles — todo consume entre 8% y 15% del costo del material.</div></li>
    <li><span class="li-icon">❌</span><div><strong>No incluyen el transporte e instalación</strong> — el tiempo de ir, instalar y volver es trabajo remunerado.</div></li>
    <li><span class="li-icon">❌</span><div><strong>Tienen miedo de perder el cliente</strong> — cobran menos para "no perder". Resultado: pierden dinero en cada trabajo.</div></li>
  </ul></div>
  <div class="section" id="s2"><div class="sec-label"><div class="icon">🧮</div><h2>Cómo Calcular el Costo Real</h2></div>
  <div class="steps">
    <div class="step"><div class="step-num">1</div><div class="step-body"><h4>Liste todos los materiales</h4><p>Cada tubo, cada metro de chapa, cada bisagra, cada electrodo, cada litro de pintura. Sume el total y agregue 10% de desperdicio.</p></div></div>
    <div class="step"><div class="step-num">2</div><div class="step-body"><h4>Calcule el tiempo de fabricación</h4><p>Estime las horas de cada etapa: corte, soldadura, acabado, pintura. Multiplique por su valor hora.</p></div></div>
    <div class="step"><div class="step-num">3</div><div class="step-body"><h4>Sume los gastos operativos</h4><p>Energía, gas CO₂, consumibles, guantes, disolvente — aplique 12% sobre el costo del material como referencia.</p></div></div>
    <div class="step"><div class="step-num">4</div><div class="step-body"><h4>Incluya transporte e instalación</h4><p>Combustible + desgaste del vehículo + tiempo de instalación.</p></div></div>
  </div></div>
  <div class="section" id="s3"><div class="sec-label"><div class="icon">⏰</div><h2>Cálculo del Valor Hora</h2></div>
  <div class="highlight"><div class="hl-title">¿Cuánto Vale su Hora de Trabajo?</div>
  <ul>
    <li><strong>Paso 1:</strong> defina cuánto necesita ganar por mes (salario deseable)</li>
    <li><strong>Paso 2:</strong> calcule los gastos fijos mensuales del taller</li>
    <li><strong>Paso 3:</strong> sume (salario + gastos fijos)</li>
    <li><strong>Paso 4:</strong> divida por las horas productivas del mes (160–180 horas)</li>
    <li><strong>Resultado: ese es su valor hora mínimo</strong></li>
  </ul></div>
  <div class="spec-grid">
    <div class="spec-card"><div class="lbl">Salario deseado</div><div class="val">$800 USD/mes</div></div>
    <div class="spec-card"><div class="lbl">Gastos fijos</div><div class="val">$400 USD/mes</div></div>
    <div class="spec-card"><div class="lbl">Total necesario</div><div class="val">$1.200 USD/mes</div></div>
    <div class="spec-card"><div class="lbl">Horas productivas</div><div class="val">160 horas</div></div>
    <div class="spec-card"><div class="lbl">Valor hora mínimo</div><div class="val">$7,50 USD/h</div></div>
    <div class="spec-card"><div class="lbl">Con margen 30%</div><div class="val">$9,75 USD/h</div></div>
  </div></div>
  <div class="section" id="s4"><div class="sec-label"><div class="icon">📊</div><h2>Fórmula del Precio Final</h2></div>
  <div class="highlight"><div class="hl-title">La Fórmula Correcta</div><p><strong>Precio de Venta = (Material + Mano de Obra + Gastos Operativos + Flete) ÷ (1 − Margen Deseado)</strong></p><ul>
    <li>Ejemplo: costo total $205 con margen 40%: $205 ÷ 0,60 = <strong>$341,67</strong></li>
    <li>Error común: sumar 40% al costo — $205 × 1,40 = $287 (eso solo da margen del 28%, no 40%)</li>
  </ul></div>
  <table class="data-table"><thead><tr><th>Costo Total</th><th>Margen 30%</th><th>Margen 40%</th><th>Margen 50%</th></tr></thead><tbody>
    <tr><td>$100</td><td>$143</td><td>$167</td><td>$200</td></tr>
    <tr><td>$200</td><td>$286</td><td>$333</td><td>$400</td></tr>
    <tr><td>$500</td><td>$714</td><td>$833</td><td>$1.000</td></tr>
    <tr><td>$1.000</td><td>$1.429</td><td>$1.667</td><td>$2.000</td></tr>
  </tbody></table></div>
  <div class="section" id="s5"><div class="sec-label"><div class="icon">💰</div><h2>Tabla de Precios de Referencia</h2></div>
  <table class="data-table"><thead><tr><th>Trabajo</th><th>Material</th><th>Multiplicador</th><th>Precio venta ref.</th></tr></thead><tbody>
    <tr><td>Portón corredizo 3×1,8m</td><td>$130 USD</td><td>3,5×</td><td>$455 USD</td></tr>
    <tr><td>Reja de ventana 1×1m</td><td>$25 USD</td><td>4×</td><td>$100 USD</td></tr>
    <tr><td>Baranda metálica (por metro)</td><td>$20 USD</td><td>3,5×</td><td>$70 USD/m</td></tr>
    <tr><td>Remolque jaula 2,1m</td><td>$380 USD</td><td>3×</td><td>$1.140 USD</td></tr>
    <tr><td>Mueble estante 5 estantes</td><td>$55 USD</td><td>5×</td><td>$275 USD</td></tr>
  </tbody></table></div>
  <div class="section" id="s6"><div class="sec-label"><div class="icon">📝</div><h2>Cómo Presentar el Presupuesto</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">📝</span><div><strong>Siempre por escrito</strong> — un mensaje de WhatsApp con el valor y lo que incluye ya es suficiente.</div></li>
    <li><span class="li-icon">📸</span><div><strong>Incluya una foto de referencia</strong> — muestre un trabajo similar. El cliente visualiza y decide más rápido.</div></li>
    <li><span class="li-icon">📋</span><div><strong>Especifique qué incluye</strong> — material, pintura, instalación, flete. Y también lo que NO incluye.</div></li>
    <li><span class="li-icon">⏱️</span><div><strong>Incluya el plazo de entrega</strong> — el compromiso con el plazo fideliza más que el precio bajo.</div></li>
    <li><span class="li-icon">📅</span><div><strong>Validez del presupuesto</strong> — 7 días para trabajos pequeños, 15–30 días para trabajos grandes.</div></li>
  </ul></div>`
}

,dob_p1:{
  img:'dobradora-chapas.webp',
  badge:'HERRAMIENTAS Y BONUS',
  title:'Proyecto Dobladora de Chapas Profesional',
  sub:'Construya su propia dobladora de chapas — una herramienta que se paga sola en el primer trabajo y abre nuevos servicios.',
  toc:[{id:'s1',label:'Para qué sirve'},{id:'s2',label:'Especificaciones'},{id:'s3',label:'Materiales'},{id:'s4',label:'Fabricación'},{id:'s5',label:'Uso correcto'},{id:'s6',label:'Negocios'}],
  html:`
  <div class="intro-box">Una dobladora de chapas transforma su taller — deja de tercerizar doblados, agrega un servicio nuevo y cobra más por trabajos que antes no podía ejecutar. <strong>Construir la suya propia cuesta entre 10% y 20% del precio de una nueva</strong>.</div>
  <div class="section" id="s1"><div class="sec-label"><div class="icon">🔧</div><h2>Para qué Sirve la Dobladora</h2></div>
  <ul class="content-list">
    <li><span class="li-icon">📦</span><div><strong>Cajas y bandejas metálicas</strong> — para equipos eléctricos, armarios de distribución.</div></li>

  <div class="section" id="s2"><div class="sec-label"><div class="icon">📐</div><h2>Especificaciones</h2></div>

    <li><span class="li-icon">✅</span><div><strong>Spring-back:</strong> el metal vuelve un poco. Para 90° final, doble a 92°–95° y el metal se acomodará.</div></li>
    <li><span class="li-icon">⚠️</span><div><strong>No supere la capacidad:</strong> forzar chapas más gruesas daña la mordaza y el eje.</div></li>
